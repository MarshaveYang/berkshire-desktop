name = "berkshire-desktop"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

# D1 数据库绑定。
# 1. 先执行 `wrangler d1 create berkshire-desktop-db` 创建数据库
# 2. 把返回的 database_id 填到下面
# 3. 本地开发用 `npm run db:migrate:local`，线上首次部署后用 `npm run db:migrate:remote` 建表
[[d1_databases]]
binding = "DB"
database_name = "berkshire-desktop-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# 下面这些不要写在这里（wrangler.toml 会被提交到 git）。
# 请用 `wrangler pages secret put <NAME>` 或 Cloudflare 控制台的
# Pages 项目 -> Settings -> Environment variables 配置为 Secret：
#   SITE_PASSWORD        登录密码
#   SESSION_SECRET        任意一长串随机字符串，用于签名 session cookie
#   DEFAULT_PROVIDER      deepseek | claude | openai | minimax（默认 deepseek）
#   DEEPSEEK_API_KEY      DEEPSEEK_MODEL（可选，默认 deepseek-chat）
#   ANTHROPIC_API_KEY     ANTHROPIC_MODEL（可选，默认 claude-sonnet-5；唯一带联网搜索的分支）
#   OPENAI_API_KEY        OPENAI_MODEL（可选）
#   MINIMAX_API_KEY       MINIMAX_MODEL（可选，默认 MiniMax-M2.1）
